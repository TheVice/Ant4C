        ${{ github.workspace }}/build-modules-net/net.module_tests --tests_xml=${{ github.workspace }}/tests.xml --build_file=${{ github.workspace }}/modules/net/net.xml -D:net_host_folder="$DOTNET_ROOT/packs/Microsoft.NETCore.App.Host.osx-x64" -D:sub_folder="runtimes/osx-x64/native" -D:nethost_file_name="libnethost.dylib" -D:fxr_folder="$DOTNET_ROOT/host/fxr" -D:net_core_app="$DOTNET_ROOT/shared/Microsoft.NETCore.App" --gtest_filter=TestNetModuleEx*

    - name: Run 'test_hostfxr_initialize_for_dotnet_command_line' (macOS)
      if: ${{ 'macOS' == runner.os }}
